<!DOCTYPE html>
<html>
<head>
<title>Admin Login</title>
<style>
body{font-family:Arial;background:linear-gradient(to right,#ff9966,#ff5e62);text-align:center;color:white;padding:40px;}
.box{background:white;color:black;padding:20px;margin:20px auto;width:350px;border-radius:10px;}
input{padding:8px;margin:5px;}
button{padding:10px;background:yellow;border:none;font-weight:bold;}
</style>
</head>
<body>
<h1>Admin Login</h1>
<div class="box">
<form method="post" action="/admin">
<input name="username" placeholder="Username" required><br>
<input name="password" placeholder="Password" type="password" required><br>
<button>Login</button>
</form>
</div>
</body>
</html>
