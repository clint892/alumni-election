<!DOCTYPE html>
<html>
<head>
<title>Candidate Application</title>
<style>
body {background:#fff3e0; font-family:Arial; padding:20px;}
input, button {padding:8px; margin:5px 0;}
button {background:#ff5722; color:white; border:none; border-radius:5px;}
button:hover {background:#e64a19;}
</style>
</head>
<body>
<h1>Apply As Candidate</h1>
<form action="/apply_candidate" method="post">
<input name="name" placeholder="Full Name" required><br>
<input name="email" placeholder="Email" required><br>
<input type="text" name="position" placeholder="Candidate Position" required><br>
<button type="submit">Submit Application</button>
</form>
</body>
</html>
