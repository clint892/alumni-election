<!DOCTYPE html>
<html>
<head>
<title>Election Results</title>
<style>
body {background:#f3e5f5; font-family:Arial; padding:20px;}
table {border-collapse: collapse; width:80%;}
th, td {border:1px solid #666; padding:8px; text-align:center;}
th {background:#7b1fa2; color:white;}
</style>
</head>
<body>
<h1>Election Results</h1>
<table>
<tr><th>Candidate</th><th>Position</th><th>Votes</th><th>Percentage</th></tr>
{% for r in results %}
<tr>
<td>{{r.name}}</td>
<td>{{r.position}}</td>
<td>{{r.votes}}</td>
<td>{{r.percent}}%</td>
</tr>
{% endfor %}
</table>
<br>
<a href="/">Back to Home</a>
</body>
</html>
