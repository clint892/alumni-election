<!DOCTYPE html>
<html>
<head>

<title>Election</title>

<style>

body{
font-family:Arial;
background:linear-gradient(to right,#00c6ff,#0072ff);
text-align:center;
color:white;
padding:40px;
}

.box{
background:rgba(0,0,0,0.3);
padding:20px;
margin:20px auto;
width:350px;
border-radius:10px;
}

input,select{
padding:8px;
margin:5px;
}

button{
padding:10px;
background:yellow;
border:none;
font-weight:bold;
}

</style>

</head>

<body>

<h1>Alumni Election System</h1>

<div class="box">

<h2>Register</h2>

{% if registration %}

<form method="post" action="/register">

<input name="name" placeholder="Name"><br>

<input name="email" placeholder="Email"><br>

<button>Register</button>

</form>

{% else %}

Registration Closed

{% endif %}

</div>


<div class="box">

<h2>Vote</h2>

{% if voting %}

<form method="post" action="/vote">

<input name="email" placeholder="Your Email"><br>

<select name="candidate_id">

{% for c in candidates %}

<option value="{{c.doc_id}}">

{{c.name}} - {{c.position}}

</option>

{% endfor %}

</select>

<br>

<button>Vote</button>

</form>

{% else %}

Voting Not Started

{% endif %}

</div>


<div class="box">

<a href="/apply_candidate_page">Apply as Candidate</a>

</div>

<br>

<a href="/admin">Admin Login</a>

</body>
</html>
