<!DOCTYPE html>
<html>
<head>
<title>Alumni Election</title>
<style>
body {
  font-family: Arial, sans-serif;
  background: linear-gradient(to right, #74ebd5, #ACB6E5);
  color: #333;
  padding: 20px;
}
h1 {color:#222;}
button {background:#4444ff; color:white; padding:10px 20px; border:none; border-radius:5px;}
button:hover {background:#2222aa;}
input {padding:8px; width:200px; margin:5px 0;}
a {color:#4444ff; text-decoration:none;}
a:hover {text-decoration:underline;}
</style>
</head>
<body>

<h1>Alumni Election System</h1>

<h2>Voter Registration</h2>

{% if registration_open %}
<form action="/register" method="post">
<input name="name" placeholder="Name" required><br>
<input name="email" placeholder="Email" required><br>
<button type="submit">Register</button>
</form>
{% else %}
<p>Registration is closed</p>
{% endif %}

<h2>Voting</h2>
{% if voting_open %}
<form action="/vote" method="post">
<input name="email" placeholder="Your Email" required><br>
<select name="candidate_id">
{% for c in candidates %}
<option value="{{c.doc_id}}">{{c.name}} - {{c.position}}</option>
{% endfor %}
</select><br>
<button type="submit">Vote</button>
</form>
{% else %}
<p>Voting is closed</p>
{% endif %}

<h2>Candidate Application</h2>
<a href="/apply_candidate_page">Apply Here</a><br><br>

<a href="/admin">Admin Login</a> | <a href="/results">View Results</a>

</body>
</html>
